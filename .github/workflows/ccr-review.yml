name: CCR Review Sample

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  ccr-review:
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest

  env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  steps:
    - name: Checkout PR head
      uses: actions/checkout@v5
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0
  
    - name: Debug changed files
      run: git diff --name-status ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}
  
    - name: Run CCR review action
      uses: VanGoghCode/ccr-test@v1
      with:
        api-key: ${{ secrets.ASU_API_KEY }}
        github-token: ${{ github.token }}
        base-url: https://api-main.aiml.asu.edu/queryV2
        model-provider: openai
        model: gpt5_2
        base-ref: ${{ github.event.pull_request.base.sha }}
        head-ref: ${{ github.event.pull_request.head.sha }}
        architecture: parallel
        post-inline-comments: "true"
        inline-comment-limit: "30"
        inline-comment-mode: file-coverage
        include-globs: "**/*"
        exclude-globs: "node_modules/**,dist/**,coverage/**,.git/**"
        output-path: CCR.md
  
    - name: Upload CCR markdown report
      if: ${{ always() }}
      uses: actions/upload-artifact@v5
      with:
        name: ccr-report-${{ github.run_id }}
        path: CCR.md
        if-no-files-found: ignore
